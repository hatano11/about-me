<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | My Portfolio</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="contact">
    
    <!-- Header -->
    <header class="header">

        <div class="logo">
            <h1>MY PORTFOLIO</h1>
        </div>

        <nav>
            <ul class="nav-list">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">PROFILE</a></li>
                <li><a href="games.html">GAMES</a></li>
                <li><a href="music.html">MUSIC</a></li>
                <li><a href="anime.html">ANIME & MANGA</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>

    </header>

    <!-- Main -->
    <main>

        <section>

            <h2 class="section-title">CONTACT</h2>

            <div class="contact-form">

                <form action="#">

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="お名前を入力してください">

                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="メールアドレスを入力してください">

                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="件名を入力してください">

                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="お問い合わせ内容を入力してください"></textarea>

                    <button type="submit">SEND</button>

                </form>

            </div>

        </section>

    </main>

    <!-- Footer -->
    <footer class="footer">

        <p>&copy; 2026 My Portfolio</p>

    </footer>

    <script src="js/scripts.js"></script>

</body>

</html>
